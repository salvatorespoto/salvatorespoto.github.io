{% if site.github %}
	<div class="rounded_panel txt_lightgrey">
		<div class="top-rounded-panel grey-bg">
			<h1>Some ShaderToy things</h1>
		</div>
		<div class="content-rounded-panel" style="overflow: hidden;">
			<div>
				{% for shader in site.shadertoy.shaders %}
					<div class="col-sm-6">
						{% if shader.title %}
							{{shader.title}}</br>
						{% endif %}
						{% if shader.link %}
							<iframe width="100%" frameborder="0" src={{shader.link}} allowfullscreen></iframe>
						{% endif %}
					</div></br>
				{% endfor %}
			</div>
		</div>
	</div>
{% endif %}
