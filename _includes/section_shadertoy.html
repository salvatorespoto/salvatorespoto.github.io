{% if site.github %}
	<div class="rounded_panel txt_lightgrey">
		<div class="top-rounded-panel grey-bg">
			<h1>ShaderToy shaders</h1>
		</div>
		<div class="content-rounded-panel" style="overflow: hidden;">
			<div>
				{% for shader in site.shadertoy.shaders %}
					<div class="col-sm-12">
						{% if shader.title %}
							<h3>{{shader.title}}</h3>
						{% endif %}
						<div class="col-sm-6">
						{% if shader.shaderId %}
							<a href="https://www.shadertoy.com/view/{{shader.shaderId}}" ><img style="width:80%" src="https://www.shadertoy.com/media/shaders/{{shader.shaderId}}.jpg" /></a>
						{% endif %}
						</div>
						<div class="col-sm-12">
						{% if shader.description %}
							{{shader.description}}
						{% endif %}
						</div>
					</div>
				{% endfor %}
			</div>
		</div>
	</div>
{% endif %}
