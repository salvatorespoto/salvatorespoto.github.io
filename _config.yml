 #List of ShaderToy shaders
shadertoy:
  shaders:
  - title: Baking normal maps
    shaderId: wstyzH
    description: |
     <br>Here I demonstrate the process of backing the normal maps from a high detailed (HD) object to the tangent space of a low detailed (LD) object.
     Rays are casted from outside the objects, normal are sampled from the HD model and mapped to the LD one. This mapping then transformed in the LD tangent space.
     The HD object is dynamic changing and the normal are sampled in real time, so you can see how the changes in the HD model affect the LD. <br><br>
     <a target="_blank" href="https://shadertoy.com/view/wstyzH"> Link to the shader </a>
     
  - title: Wireframe rasterizer
    shaderId: wtVSDh
    description: |
     <br>A little wireframe rasterizer. It uses the same transformations pipeline that OpenGL:
     Object -> Eye -> Clip -> NDC -> Window. When in window coordinates the points are rasterized as wireframe.
     This is a very good exercise to learn how a vertex makes its way to the screen.<br><br>
     <a target="_blank" href="https://shadertoy.com/view/wtVSDh"> Link to the shader </a>
     
  - title: Blinn-Phong 3d3cWN
    shaderId: 3d3cWN
    description: |
     <br>A test of the Blinn-Phong model shading, that use  ambient + diffuse + specular. The specular component uses the Schlick's approximation to compute the
     Freshnel factor. Environment reflection are added from a cubemap. <br><br>
     <a target="_blank" href="https://shadertoy.com/view/3d3cWN"> Link to the shader </a>
    
